name: Build & Deploy to Azure

on:
  push:
    branches: [main]

env:
  ACR_NAME: gatekeeperacr
  RESOURCE_GROUP: rg-gatekeeper-prod
  FRONTEND_APP: ca-gatekeeper-frontend-prod
  GATEWAY_APP: ca-gatekeeper-gateway-prod

jobs:
  build-and-deploy:
    name: Build images & deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Build and push frontend image
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/gatekeeper/frontend:$IMAGE_TAG \
            -t $ACR_NAME.azurecr.io/gatekeeper/frontend:latest \
            -f apps/frontend/Dockerfile \
            .
          docker push $ACR_NAME.azurecr.io/gatekeeper/frontend:$IMAGE_TAG
          docker push $ACR_NAME.azurecr.io/gatekeeper/frontend:latest

      - name: Build and push gateway image
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/gatekeeper/gateway:$IMAGE_TAG \
            -t $ACR_NAME.azurecr.io/gatekeeper/gateway:latest \
            -f apps/gateway/Dockerfile \
            .
          docker push $ACR_NAME.azurecr.io/gatekeeper/gateway:$IMAGE_TAG
          docker push $ACR_NAME.azurecr.io/gatekeeper/gateway:latest

      - name: Deploy gateway to Container Apps
        run: |
          az containerapp update \
            --name $GATEWAY_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/gatekeeper/gateway:$IMAGE_TAG

      - name: Deploy frontend to Container Apps
        run: |
          az containerapp update \
            --name $FRONTEND_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/gatekeeper/frontend:$IMAGE_TAG

      - name: Verify gateway health
        run: |
          GATEWAY_URL=$(az containerapp show \
            --name $GATEWAY_APP \
            --resource-group $RESOURCE_GROUP \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          curl -f "https://$GATEWAY_URL/health" || exit 1
          echo "Gateway healthy at https://$GATEWAY_URL"

events {
  worker_connections 1024;
}

http {
  # Docker internal DNS — resolves service names to all replica IPs
  resolver 127.0.0.11 valid=10s ipv6=off;

  upstream frontend_upstream {
    server frontend:3000;
  }

  # Use variable so Nginx doesn't fail to start if gateway isn't up yet
  # Also enables round-robin across gateway replicas when scaled
  server {
    listen 80;

    # Gateway traffic — user API proxy calls
    # URL pattern: /gw/{projectId}/path → gateway /{projectId}/path
    location /gw/ {
      set $gateway_upstream gateway:3001;
      rewrite ^/gw/(.*) /$1 break;
      proxy_pass http://$gateway_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_read_timeout 60s;
      proxy_connect_timeout 5s;
    }

    # Dashboard + Platform API (Next.js)
    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
    }
  }
}
